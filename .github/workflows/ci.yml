name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  CARGO_HOME: ${{ github.workspace }}/.cargo
  RUST_BACKTRACE: 1
  CMAKE_POLICY_VERSION_MINIMUM: 3.5

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libopus-dev \
            pkg-config \
            python3 \
            python3-pip
          rm -rf /var/lib/apt/lists/*

      - name: Install Python invoke (preflight)
        run: python3 -m pip install --upgrade --target /tmp/pip-invoke invoke

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: .cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-lint-${{ hashFiles('Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm
    permissions:
      contents: read
    services:
      # Real backends for the `--ignored` integration tests (Postgres migrations +
      # persistence, SMTP delivery, OIDC round-trip). Reached by service label from the job
      # container.
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wiab
          POSTGRES_PASSWORD: wiab
          POSTGRES_DB: wiab
        options: >-
          --health-cmd "pg_isready -U wiab -d wiab"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      mailpit:
        image: axllent/mailpit
      oidc-mock:
        image: ghcr.io/navikt/mock-oauth2-server:2.1.10
    steps:
      - uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libopus-dev \
            pkg-config \
            python3 \
            python3-pip
          rm -rf /var/lib/apt/lists/*

      - name: Install Python invoke (preflight)
        run: python3 -m pip install --upgrade --target /tmp/pip-invoke invoke

      - name: Install rustfmt component
        run: rustup component add rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: .cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-test-${{ hashFiles('Cargo.lock') }}

      - name: Run tests
        run: cargo test --workspace

      - name: Run integration tests (Postgres migrations + persistence, Mailpit, mock OIDC)
        env:
          DATABASE_URL: postgres://wiab:wiab@postgres:5432/wiab
          MAILPIT_SMTP_HOST: mailpit
          MAILPIT_API: http://mailpit:8025
          OIDC_MOCK_ISSUER: http://oidc-mock:8080/default
        run: |
          cargo test -p wiab-inf --test postgres_integration -- --ignored
          cargo test -p authbox-inf --test smtp_mailpit --test oidc_mock -- --ignored

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install llvm-tools
        run: rustup component add llvm-tools-preview

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: .cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-coverage-${{ hashFiles('Cargo.lock') }}

      - name: Check coverage (wiab-core, 98%)
        run: cargo llvm-cov --package wiab-core --fail-under-lines 98

  build:
    name: Build
    runs-on: ubuntu-latest
    container:
      image: rust:1.92-bookworm
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install native build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libopus-dev \
            pkg-config \
            python3 \
            python3-pip
          rm -rf /var/lib/apt/lists/*

      - name: Install Python invoke (preflight)
        run: python3 -m pip install --upgrade --target /tmp/pip-invoke invoke

      - name: Install rustfmt component
        run: rustup component add rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: .cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: .cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('Cargo.lock') }}

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-target-build-${{ hashFiles('Cargo.lock') }}

      - name: Build
        run: cargo build
